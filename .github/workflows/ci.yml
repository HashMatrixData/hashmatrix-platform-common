# PR / push 级持续集成：跑 `mvn verify`（编译 + 单测 + Testcontainers 集成测试）。
#
# 为何存在：本仓唯一的 publish-image 工作流是 **tag-only** 出镜像，普通 push / PR **从不构建**——
#   坏代码（如集成测试无法 bootstrap Spring 上下文）会无声漏进 main。本工作流在 **PR 即跑 verify**，
#   把回归挡在合并前；push main 再跑一次作为合并后兜底。
#
# 🔴 红线：解析 hashmatrix-* 私有制品所需的 Maven settings.xml 经仓库 secret MAVEN_SETTINGS_XML 注入
#   （含 read:packages PAT），仅写入 runner 的 ~/.m2、**绝不入库**。
#
# 依赖门控：制品基线 pin 到 libs-java（见 pom.xml / README）；制品发布到 GitHub Packages 后本工作流方能绿。
#   fork 发起的 PR 拿不到仓库 secret，会在解析私有制品处失败——属预期（仅内部分支 PR 跑全绿）。
name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: 写入 Maven settings（来自 secret，仅 runner ~/.m2）
        env:
          MAVEN_SETTINGS_XML: ${{ secrets.MAVEN_SETTINGS_XML }}
        run: |
          mkdir -p "$HOME/.m2"
          # 经 env 传入避免 XML 多行 / 特殊字符被 shell 误解析；未配置该 secret 时写空文件，
          # 构建会在解析私有制品处显式失败（须先配置 MAVEN_SETTINGS_XML，含 read:packages PAT）。
          printf '%s' "$MAVEN_SETTINGS_XML" > "$HOME/.m2/settings.xml"

      - name: mvn verify（编译 + 单测 + Testcontainers 集成测试）
        # ubuntu-latest 自带 Docker daemon，Testcontainers 起 postgres:16-alpine 跑 *IT。
        run: mvn -B -ntp verify
