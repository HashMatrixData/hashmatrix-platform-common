# 构建并推送 platform-common 容器镜像到 GitHub Container Registry（ghcr.io）。
#
# 触发：打 semver tag（v*.*.*）→ 构建并推送；或手动 workflow_dispatch → 默认 dry-run（仅构建不推）。
#   仅在发版 tag / 手动触发上运行，**普通 push / PR 不触发**——避免在上游制品（hashmatrix-bom / libs-java
#   v0.2.0 等）发布前让 main 的 CI 变红（本仓依赖基线 pin 到 v0.2.0，见 pom.xml / README 门控说明）；
#   制品就绪后打 tag 即出镜像。
#
# 🔴 红线：制品仓凭据 / Maven settings 一律运行期注入，**绝不入库 / 不落镜像层**。
#   - GHCR 登录用内置 GITHUB_TOKEN（需 packages: write 权限）。
#   - 解析 hashmatrix-* 私有制品（GitHub Packages · 仓库 HashMatrixData/hashmatrix）所需的
#     Maven settings.xml 由本工作流用内置 GITHUB_TOKEN 现拼（github.actor + token，含 read:packages）：
#     运行时写入 runner 临时目录，再以 BuildKit secret（id=maven_settings）挂入 docker build
#     （见 Dockerfile 的 --mount=type=secret）——不写进任何镜像层、不入库。
#   - 与 governance 仓一致：同 org 内置 token 即可跨仓读 Packages，无需 PAT / 自定义 secret。
#     （前提：HashMatrixData/hashmatrix 的 Packages 对本 org 仓可见；governance image job 已验证可行。）
name: publish-image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push:
        description: '推送到 ghcr（false=仅本地构建 dry-run）'
        type: boolean
        default: false

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  # 镜像名对齐主仓 deploy/values（ghcr owner 须全小写）。
  IMAGE: ghcr.io/hashmatrixdata/platform-common

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 解析镜像 tag（semver / 短 SHA）
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"            # v1.2.3 → 1.2.3
          else
            version="0.0.0-dev.${GITHUB_SHA::7}"
          fi
          {
            echo "version=${version}"
            echo "tags=${IMAGE}:${version},${IMAGE}:sha-${GITHUB_SHA::7}"
          } >> "$GITHUB_OUTPUT"

      - name: 判定是否推送（tag → 推；dispatch → 看输入）
        id: gate
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=${{ inputs.push }}" >> "$GITHUB_OUTPUT"
          fi

      # 用内置 GITHUB_TOKEN 现拼 settings.xml（与 governance 仓同款），供镜像内 build 阶段
      # `mvn package` 经 GitHub Packages 解析 parent/BOM 及 libs-java 制品。
      # 关键：pom 的 <repositories> 解析不到 <parent> 自身，parent 必须经 settings.xml 的
      # profile-repository 解析，故此处不仅写 server 凭据、还注册制品仓并激活 profile。
      - name: 配置 Maven settings（GitHub Packages · 内置 token）
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > "${RUNNER_TEMP}/m2-settings.xml" <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GH_ACTOR}</username>
                <password>${GH_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        if: steps.gate.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.gate.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          secret-files: |
            maven_settings=${{ runner.temp }}/m2-settings.xml
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
